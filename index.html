<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Urban Thrift</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --dark:#0a0a0a;
    --light:#f5f4f2;
    --accent:#ff5a1f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--dark);
    color:var(--light);
    font-family:'Space Mono', monospace;
    overflow-x:hidden;
}

/* Background Grid */
.hero{
    min-height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:80px 80px;
}

/* Top Labels */
.corner{
    position:absolute;
    text-transform:uppercase;
    letter-spacing:3px;
    font-size:.9rem;
    opacity:.9;
}

.top-left{
    top:70px;
    left:70px;
}

.top-right{
    top:70px;
    right:70px;
    text-align:right;
}

.line{
    width:180px;
    height:1px;
    background:#fff;
    margin-top:15px;
}

/* Main Wordmark */
.wordmark{
    font-family:'Orbitron', sans-serif;
    font-size:clamp(4rem,16vw,13rem);
    font-weight:900;
    line-height:.8;
    text-transform:uppercase;
    letter-spacing:-10px;
    position:relative;
}

/* Orange Accent */
.drop{
    position:absolute;
    top:-40px;
    left:20px;
    color:var(--accent);
    font-size:1rem;
}

/* Description */
.tagline{
    margin-top:40px;
    text-transform:uppercase;
    letter-spacing:4px;
    font-size:.95rem;
    opacity:.8;
}

/* Buttons */
.hero-btn{
    margin-top:45px;
}

.btn-thrift{
    border:1px solid #fff;
    color:#fff;
    padding:14px 30px;
    margin-right:15px;
    text-decoration:none;
    text-transform:uppercase;
    transition:.4s;
}

.btn-thrift:hover{
    background:var(--accent);
    color:#000;
    border-color:var(--accent);
}

/* Bottom Left */
.bottom-left{
    position:absolute;
    left:70px;
    bottom:70px;
    text-transform:uppercase;
    letter-spacing:3px;
}

/* Bottom Right */
.bottom-right{
    position:absolute;
    right:70px;
    bottom:70px;
    text-align:right;
    text-transform:uppercase;
}

/* Floating Tags */
.floating{
    position:absolute;
    color:#ffffff20;
    text-transform:uppercase;
    font-size:4rem;
    font-family:'Orbitron', sans-serif;
    animation:float 6s ease-in-out infinite;
}

.tag1{
    top:25%;
    right:12%;
}

.tag2{
    bottom:22%;
    left:12%;
    animation-delay:2s;
}

@keyframes float{
    50%{
        transform:translateY(-20px);
    }
}

@media (max-width:768px){

    .hero{
        min-height:100dvh;
        padding:30px 20px;
        align-items:center;
    }

    /* Keep the technical labels */
    .top-left{
        top:25px;
        left:20px;
        font-size:.65rem;
        letter-spacing:2px;
    }

    .top-right{
        top:25px;
        right:20px;
        font-size:.65rem;
        letter-spacing:2px;
    }

    .line{
        width:90px;
        margin-top:10px;
    }

    /* Center content */
    .container{
        padding:0 15px;
    }

    .wordmark{
        font-size:clamp(1.5rem, 16vw, 3rem);
        line-height:.9;
        letter-spacing:-3px;
        word-break:break-word;
        max-width:100%;
    margin:auto;
    text-wrap:balance;
    }

    .drop{
        position:static;
        margin-bottom:25px;
        font-size:.8rem;
    }

    .tagline{
        margin-top:25px;
        font-size:.7rem;
        letter-spacing:2px;
        padding:0 15px;
    }

    /* Buttons remain futuristic */
    .hero-btn{
        margin-top:35px;
        display:flex;
        flex-direction:column;
        gap:12px;
        align-items:center;
    }

    .btn-thrift{
        width:220px;
        margin:0;
        padding:12px 20px;
        font-size:.75rem;
    }

    /* Keep the footer data pinned */
    .bottom-left{
        left:20px;
        bottom:25px;
        font-size:.55rem;
        letter-spacing:2px;
    }

    .bottom-right{
        right:20px;
        bottom:25px;
        font-size:.55rem;
        letter-spacing:2px;
    }

    /* Don't remove floating tags */
    .floating{
        display:block;
        font-size:1.8rem;
        opacity:.12;
    }

    .tag1{
        top:18%;
        right:5%;
    }

    .tag2{
        bottom:18%;
        left:5%;
    }
}
</style>
</head>
<body>

<section class="hero">

    <div class="corner top-left">
        CURATED<br>
        VINTAGE<br>
        COLLECTION<br><br>
        0.1V
    </div>

    <div class="corner top-right">
        _TYPE09
        <div class="line"></div>
    </div>

    <div class="container text-center position-relative">

        <div class="drop">
            DROP<br>06.26
        </div>

        <h1 class="wordmark">
            Urban Thrift
        </h1>

        <p class="tagline">
            Rare Pieces For The New Generation
        </p>

        <div class="hero-btn">
            <a href="shopdrop.html" class="btn-thrift">Shop Drop</a>
            <a href="archive.html" class="btn-thrift">Explore Archive</a>
        </div>

    </div>

    <div class="bottom-left">
        /// THRIFT<br>
        CURATED IN NAIROBI
    </div>

    <div class="bottom-right">
        + 350+ ITEMS<br>
        + WORLDWIDE SHIPPING
    </div>

    <div class="floating tag1">
        Y2K
    </div>

    <div class="floating tag2">
        VINTAGE
    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Subtle mouse movement effect
document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;

    document.querySelector('.wordmark').style.transform =
        `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
